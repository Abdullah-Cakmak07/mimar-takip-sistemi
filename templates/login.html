<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap - Mimar Takip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #2c3e50; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 400px; border: none; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="card login-card shadow-lg p-4">
        <div class="text-center mb-4">
            <h3>🏛️ Mimar Takip</h3>
            <p class="text-muted">Lütfen giriş yapın</p>
        </div>
        {% with messages = get_flashed_messages() %}
            {% if messages %}{% for m in messages %}<div class="alert alert-danger">{{ m }}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label">Kullanıcı Adı / T.C. No</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Şifre</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Giriş Yap</button>
        </form>
    </div>

    <div class="text-center mt-3">
        <p class="small">Hesabınız yok mu? <a href="/register" class="text-decoration-none">Şimdi Kayıt Olun</a></p>
    </div>

</body>
</html>
