<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol - Mimar Takip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #34495e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .reg-card { width: 450px; border-radius: 15px; border: none; }
    </style>
</head>
<body>
    <div class="card reg-card shadow-lg p-4">
        <div class="text-center mb-4">
            <h3>📝 Yeni Kayıt Oluştur</h3>
            <p class="text-muted">Projenizi takip etmek için bilgilerinizi girin</p>
        </div>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}{% for m in messages %}<div class="alert alert-warning small">{{ m }}</div>{% endfor %}{% endif %}
        {% endwith %}

        <form action="/register" method="POST">
            <div class="mb-2">
                <label class="form-label small fw-bold">Ad Soyad</label>
                <input type="text" name="ad_soyad" class="form-control" required>
            </div>
            <div class="mb-2">
                <label class="form-label small fw-bold">T.C. Kimlik No (Giriş adınız olacak)</label>
                <input type="text" name="tc_no" class="form-control" 
                       maxlength="11" minlength="11" pattern="\d{11}" 
                       title="Lütfen 11 haneli rakam giriniz"  required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-2">
                    <label class="form-label small fw-bold">Telefon</label>
                    <input type="text" name="telefon" class="form-control" placeholder="05XXXXXXXXX" required>
                </div>
                <div class="row">
    <div class="col-md-6 mb-2">
        <label class="form-label small fw-bold">Şifre</label>
        <input type="password" name="password" class="form-control" required>
    </div>
    <div class="col-md-6 mb-2">
        <label class="form-label small fw-bold">Şifre Tekrar</label>
        <input type="password" name="password_confirm" class="form-control" required>
    </div>
</div>
<small class="text-muted d-block mb-3" style="font-size: 0.7rem;">
    * Şifre en az 8 karakter, bir büyük harf ve bir sembol içermelidir.
</small>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">E-posta</label>
                <input type="email" name="eposta" class="form-control">
            </div>
            <button type="submit" class="btn btn-success w-100 py-2 mb-3">Kaydı Tamamla</button>
            <div class="text-center">
                <a href="/login" class="text-decoration-none small">Zaten hesabım var, Giriş yap</a>
            </div>
        </form>
    </div>
</body>
</html>
