<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Mimar Takip{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar-width: 250px; --bg-dark: #2c3e50; }
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; background: var(--bg-dark); color: white; }
        .main-content { margin-left: var(--sidebar-width); padding: 30px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <nav>
            <a href="/">Dashboard</a>
            <a href="/projelerim">Projelerim</a>
        </nav>
    </div>
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
