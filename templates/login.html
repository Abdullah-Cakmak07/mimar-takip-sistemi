<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Mimar Takip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #2c3e50; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 400px; border: none; border-radius: 15px; }
        .register-link-container { width: 400px; text-align: center; }
    </style>
</head>
<body>
    
    <div class="d-flex flex-column align-items-center">
        <div class="card login-card shadow-lg p-4 bg-white">
            <div class="text-center mb-4">
                <h3>🏛️ Mimar Takip</h3>
                <p class="text-muted">Lütfen giriş yapın</p>
            </div>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for m in messages %}
                        <div class="alert alert-danger py-2 small">{{ m }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Kullanıcı Adı / T.C. No</label>
                    <input type="text" name="username" class="form-control" placeholder="T.C. Kimlik numaranızı girin" required>
                </div>
                
                <div class="mb-3">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <label class="form-label small fw-bold mb-0">Şifre</label>
                        <a href="/sifremi_unuttum" class="text-decoration-none small text-secondary">Şifremi Unuttum?</a>
                    </div>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Giriş Yap</button>
            </form>
        </div>

        <div class="register-link-container mt-3">
            <p class="small text-white-50">Hesabınız yok mu? <a href="/register" class="text-decoration-none text-white fw-bold">Şimdi Kayıt Olun</a></p>
        </div>
    </div>

</body>
</html>
