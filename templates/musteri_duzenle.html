<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Müşteri Düzenle - Mimar Takip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar-width: 260px; --bg-dark: #2c3e50; --accent-color: #3498db; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .main-content { margin-left: var(--sidebar-width); padding: 40px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h5 class="fw-bold mb-4"><i class="fa-solid fa-user-pen text-primary me-2"></i>Müşteri Bilgilerini Düzenle</h5>
                    <form action="{{ url_for('musteri_duzenle', id=musteri['id']) }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Ad Soyad</label>
                            <input type="text" name="ad_soyad" class="form-control" value="{{ musteri['ad_soyad'] }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">T.C. Kimlik No (Değiştirilemez)</label>
                            <input type="text" name="tc_no" class="form-control bg-light" 
                                value="{{ musteri['tc_no'] }}" readonly>
                            <div class="form-text text-warning" style="font-size: 0.7rem;">
                                * T.C. numarası kimlik güvenliği nedeniyle güncellenemez.
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Telefon</label>
                            <input type="text" name="telefon" class="form-control" value="{{ musteri['telefon'] }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">E-posta</label>
                            <input type="email" name="eposta" class="form-control" value="{{ musteri['eposta'] }}">
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary w-100 fw-bold">Değişiklikleri Kaydet</button>
                            <a href="{{ url_for('musteriler') }}" class="btn btn-light w-100">İptal</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
