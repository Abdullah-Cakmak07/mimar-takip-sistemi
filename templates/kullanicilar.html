<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kullanıcı Yönetimi - Mimar Takip</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --sidebar-width: 250px; --bg-dark: #2c3e50; --accent-color: #3498db; }
        body { background-color: #f4f7f6; }
        .sidebar { width: var(--sidebar-width); height: 100vh; background-color: var(--bg-dark); position: fixed; left: 0; top: 0; color: white; padding-top: 20px; }
        .sidebar a { padding: 15px 25px; display: block; color: #bdc3c7; text-decoration: none; transition: 0.3s; }
        .sidebar a:hover { background-color: #34495e; color: white; }
        .main-content { margin-left: var(--sidebar-width); padding: 30px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="text-center mb-4"><h4>Mimar Takip</h4><small class="badge bg-danger">ADMİN</small></div>
        <nav>
            <a href="/"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="/musteriler"><i class="fa-solid fa-address-book"></i> Müşteri Yönetimi</a>
            <a href="/kullanicilar" style="background-color: #34495e; color: white; border-left: 4px solid var(--accent-color);"><i class="fa-solid fa-user-gear"></i> Kullanıcı Yönetimi</a>
            <hr class="mx-3">
            <a href="/logout" class="text-danger"><i class="fa-solid fa-right-from-bracket"></i> Çıkış</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-4 shadow-sm mb-4">
                    <h5 class="fw-bold mb-3">Yeni Kullanıcı</h5>
                    <form action="/kullanici_ekle" method="POST">
                        <input type="text" name="ad_soyad" class="form-control mb-2" placeholder="Ad Soyad" required>
                        <input type="text" name="kullanici_adi" class="form-control mb-2" placeholder="Kullanıcı Adı" required>
                        <input type="password" name="sifre" class="form-control mb-2" placeholder="Şifre" required>
                        <select name="rol" class="form-select mb-3"><option value="mimar">Mimar</option> <option value="admin">Yönetici</option></select>
                        <button class="btn btn-primary w-100 shadow-sm">Kullanıcıyı Kaydet</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-4 shadow-sm">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold mb-0">Sistem Kullanıcıları</h5>
                        <!-- Arama Kutusu[cite: 7] -->
                        <form action="/kullanicilar" method="GET" class="d-flex w-50">
                            <input type="text" name="search" class="form-control form-control-sm me-2" placeholder="Ara..." value="{{ search_query }}">
                            <button type="submit" class="btn btn-sm btn-dark">Ara</button>
                        </form>
                    </div>

                    <table class="table table-hover align-middle">
                        <thead><tr><th>Kullanıcı</th><th class="text-center">Projeler</th><th class="text-center">Müşteriler</th><th class="text-center">İşlem</th></tr></thead>
                        <tbody>
    {% for k in kullanicilar %}
    <tr>
        <td>
            <b>{{ k.ad_soyad }}</b><br>
            <small class="text-muted">TC: {{ k.kullanici_adi }}</small>
        </td>
        <td class="text-center">
            <span class="badge bg-primary">{{ k.p_sayisi }}</span>
        </td>
        <td class="text-center">
            <span class="badge bg-info text-dark">{{ k.m_sayisi }}</span>
        </td>
        <td class="text-center">
            <a href="/kullanici_sil/{{ k.id }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Silinsin mi?')">
                <i class="fa-solid fa-trash"></i>
            </a>
        </td>
    </tr>
    {% endfor %}
</tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
